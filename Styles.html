<style>
  :root{
    --bg1:#0b1020;
    --bg2:#070a12;
    --card: rgba(255,255,255,.10);
    --card2: rgba(255,255,255,.07);
    --border: rgba(255,255,255,.16);
    --text: rgba(255,255,255,.94);
    --muted: rgba(255,255,255,.72);
    --glow: 0 0 26px rgba(120, 190, 255, .22);
    --radius: 18px;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    color: var(--text);
    background:
      radial-gradient(1200px 800px at 20% 10%, rgba(76, 155, 255, .20), transparent 60%),
      radial-gradient(900px 700px at 80% 30%, rgba(195, 80, 255, .18), transparent 60%),
      linear-gradient(180deg, var(--bg1), var(--bg2));
    min-height:100vh;
  }

  a{ color:inherit; }

  .wrap{ max-width: 1020px; margin: 0 auto; padding: 18px 14px 34px; }

  .topbar{ display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom: 14px; }

  .brandRow{ display:flex; align-items:center; gap:12px; }

  .brandMark{
    width: 42px; height: 42px; border-radius: 14px;
    border: 1px solid rgba(255,255,255,.18);
    background: rgba(120,190,255,.10);
    box-shadow: var(--glow);
  }

  .brandTitle{ font-weight: 950; letter-spacing:.4px; line-height:1.05; }
  .brandSub{ font-size: 12px; color: var(--muted); font-weight: 750; margin-top: 2px; }

  .pill{
    display:inline-flex; align-items:center; gap:10px;
    padding:10px 12px;
    border:1px solid var(--border);
    background: rgba(255,255,255,.07);
    border-radius: 999px;
    box-shadow: var(--glow);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    font-weight: 800;
    letter-spacing: .2px;
  }
  .pill small{ color: var(--muted); font-weight:700; }

  .grid{ display:grid; grid-template-columns: 1.05fr .95fr; gap: 14px; }
  @media (max-width: 900px){ .grid{ grid-template-columns: 1fr; } }

  .card{
    border:1px solid var(--border);
    background: linear-gradient(180deg, var(--card), var(--card2));
    border-radius: var(--radius);
    box-shadow: var(--glow);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 14px;
  }

  .card h2{ margin:0 0 10px; font-size: 16px; letter-spacing: .2px; }

  label{ display:block; font-size: 12px; color: var(--muted); margin: 10px 0 6px; font-weight: 700; }

  input, select, textarea{
    width:100%;
    padding: 11px 12px;
    border-radius: 14px;
    border:1px solid rgba(255,255,255,.16);
    background: rgba(0,0,0,.24);
    color: var(--text);
    outline: none;
    font-size: 14px;
  }

  input::placeholder, textarea::placeholder{ color: rgba(255,255,255,.45); }

  textarea{ min-height: 82px; resize: vertical; }

  .row{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  @media (max-width: 540px){ .row{ grid-template-columns: 1fr; } }

  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    width:100%;
    padding: 12px 14px;
    border-radius: 14px;
    border:1px solid rgba(255,255,255,.20);
    background: rgba(120,190,255,.12);
    color: var(--text);
    font-weight: 900;
    cursor:pointer;
    transition: transform .08s ease, background .15s ease;
    user-select:none;
    text-decoration:none;
  }

  .btn:hover{ background: rgba(120,190,255,.16); }
  .btn:active{ transform: scale(.99); }

  .mutedBtn{ background: rgba(255,255,255,.07); }
  .mutedBtn:hover{ background: rgba(255,255,255,.10); }

  .oneBtn{ display:block; margin-top:12px; }
  .oneBtn .btn{ width:100%; }

  .twoBtns{ display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 12px; }
  @media (max-width: 540px){ .oneBtn{ display:block; margin-top:12px; }
  .oneBtn .btn{ width:100%; }

  .twoBtns{ grid-template-columns: 1fr; } }

  .priceBox{
    border:1px solid rgba(255,255,255,.16);
    background: rgba(0,0,0,.22);
    border-radius: 16px;
    padding: 12px;
    margin-top: 12px;
  }

  .bigPrice{ font-size: 26px; font-weight: 950; letter-spacing: .2px; margin: 2px 0; }
  .smallLine{ font-size: 13px; color: var(--muted); margin-top: 2px; font-weight: 700; }
  .note{ margin-top: 8px; font-size: 12px; color: var(--muted); font-weight: 650; }

  .qrWrap{ display:grid; grid-template-columns: 180px 1fr; gap: 12px; align-items: start; }
  @media (max-width: 540px){ .qrWrap{ grid-template-columns: 1fr; } }

  .qr{
    width:100%;
    max-width: 240px;
    background: #fff;
    border-radius: 16px;
    padding: 12px;
  }

  .chips{ display:flex; flex-wrap:wrap; gap: 8px; margin-bottom: 8px; }
  .chip{
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 999px;
    border:1px solid rgba(255,255,255,.18);
    background: rgba(255,255,255,.07);
    color: var(--text);
    font-weight: 900;
  }

  .copyRow{ display:grid; grid-template-columns: 1fr auto; gap: 8px; margin-top: 8px; }

  .copyBtn{
    padding: 10px 12px;
    border-radius: 14px;
    border:1px solid rgba(255,255,255,.20);
    background: rgba(255,255,255,.07);
    color: var(--text);
    font-weight: 900;
    cursor:pointer;
  }
  .copyBtn:hover{ background: rgba(255,255,255,.10); }

  .success{ margin-top: 10px; font-size: 13px; color: rgba(170,255,210,.92); display:none; font-weight:700; }
  .error{ margin-top: 10px; font-size: 13px; color: rgba(255,170,170,.92); display:none; font-weight:700; }

  .hintLine{ font-size: 12px; color: rgba(255,255,255,.78); font-weight: 700; margin-top: 8px; }


.logo{width:44px;height:44px;border-radius:50%;object-fit:cover;border:1px solid rgba(255,255,255,.18);box-shadow:0 0 18px rgba(120,190,255,.28);background:rgba(255,255,255,.06)}


  .pendingItem{
    border:1px solid rgba(255,255,255,.12);
    background: rgba(0,0,0,.18);
    border-radius: 16px;
    padding: 12px;
    margin: 10px 0;
  }
  .pendingItem.focus{ outline:2px solid rgba(120,190,255,.35); }
  .pendingTop{ display:flex; justify-content:space-between; gap:10px; }
  .pendingMid{ margin-top:8px; display:grid; gap:4px; }
  .pendingBtns{ margin-top:10px; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .muted{ opacity:.75; }
</style>
